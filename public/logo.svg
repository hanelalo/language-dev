<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Document base -->
  <rect x="36" y="28" width="56" height="72" rx="4" fill="url(#doc)"/>

  <!-- Document fold corner -->
  <path d="M72 28 L92 28 L92 48 L72 28 Z" fill="#e2e8f0"/>

  <!-- Text lines on document -->
  <rect x="44" y="38" width="28" height="4" rx="2" fill="#94a3b8"/>
  <rect x="44" y="48" width="36" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="44" y="58" width="24" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="44" y="68" width="32" height="4" rx="2" fill="#cbd5e1"/>
  <rect x="44" y="78" width="20" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Translation symbol "译" -->
  <text x="80" y="88" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#7c3aed" text-anchor="middle">译</text>

  <!-- Small globe accent -->
  <circle cx="96" cy="36" r="16" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <ellipse cx="96" cy="36" rx="6" ry="16" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <line x1="80" y1="36" x2="112" y2="36" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <line x1="96" y1="20" x2="96" y2="52" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
</svg>
